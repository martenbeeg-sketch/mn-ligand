name: biochem-docking
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  
  # Core web framework (for service API)
  - flask
  - flask-cors
  - werkzeug
  
  # Scientific computing (shared by most services)
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  
  # Chemistry and molecular processing (core)
  - rdkit
  - biopython
  - pdbfixer
  
  # Utilities
  - requests
  - pillow
  - pyyaml
  
  # Docking tools
  - vina
  - openbabel
  - gemmi  # Required by meeko for polymer/template handling
  
  # Pip packages
  - pip:
    - meeko
    - fastapi>=0.104.1
    - uvicorn[standard]>=0.24.0
    - httpx>=0.25.0
    - pydantic>=2.5.0
    - python-multipart>=0.0.6
    # Task queue (for worker-cpu)
    - celery>=5.3.0
    - redis>=5.0.0
